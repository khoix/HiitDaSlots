kind = "web"
previewPath = "/"
title = "HIIT da Slots"
version = "1.0.0"
id = "artifacts/hiit-da-slots"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20046

[services.development]
run = "pnpm --filter @workspace/hiit-da-slots run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hiit-da-slots", "run", "build" ]
publicDir = "artifacts/hiit-da-slots/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20046"
BASE_PATH = "/"
